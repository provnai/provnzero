providers = ["rust"]

[variables]
# Optimize the build profile for maximum performance and smallest binary size
CARGO_PROFILE_RELEASE_LTO = "true"
CARGO_PROFILE_RELEASE_CODEGEN_UNITS = "1"
# Ensure the tokio runtime can gracefully shut down during container swaps (No Zombie Connections)
RUST_LOG = "provnzero=info,tower_http=info"


[phases.build]
cmds = ["cargo build --release -p provnzero-proxy"]

[start]
cmd = "./target/release/provnzero-proxy"
